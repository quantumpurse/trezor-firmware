syntax = "proto2";
package hw.trezor.messages.ckb;

// Sugar for easier handling in Java
option java_package = "com.satoshilabs.trezor.lib.protobuf";
option java_outer_classname = "TrezorMessageCKB";

import "options.proto";

/**
 * Request: Get CKB (Nervos Network) address for specified BIP-32 path
 * @start
 * @next CKBAddress
 * @next Failure
 */
message CKBGetAddress {
    option (wire_type) = 5500;

    repeated uint32 address_n = 1;                              // BIP-32 path to derive the key from master node (e.g., m/44'/309'/0'/0/0)
    optional bool show_display = 2;                              // optionally show on display before sending the result
    required string network = 3;                                 // "Mainnet" or "Testnet"
    optional bool chunkify = 4;                                  // display the address in chunks of 4 characters
}

/**
 * Response: CKB address encoded as Bech32m
 * @end
 */
message CKBAddress {
    option (wire_type) = 5501;

    required string address = 1;                                 // Bech32m encoded CKB address (ckb1... or ckt1...)
    optional bytes mac = 2;                                      // authentication code for the address
}

/**
 * Request: Get a CKB SPHINCS+ post-quantum address.
 *
 * The SPHINCS+ keypair is derived from the device mnemonic with HKDF-SHA256,
 * and combined with the CKB all-in-one quantum-resistant lock script to
 * produce a Bech32m address.
 *
 * Requires the device to be initialized with an extended BIP-39 mnemonic
 * (36/54/72 words) matching the requested variant's security level.
 *
 * @start
 * @next CKBSphincsPlusAddress
 * @next Failure
 */
message CKBSphincsPlusGetAddress {
    option (wire_type) = 5507;

    optional uint32 account_index = 1 [default=0];               // account index fed into the HKDF info string
    optional uint32 variant = 2 [default=49];                    // SPHINCS+ variant ID (48..=59). Default 49 = SLH-DSA-SHA2-128s
    required string network = 3;                                 // "Mainnet" or "Testnet"
    optional bool show_display = 4;                              // optionally show on display before sending
    optional bool chunkify = 5;                                  // display the address in chunks of 4 characters
}

/**
 * Response: CKB SPHINCS+ address encoded as Bech32m
 * @end
 */
message CKBSphincsPlusAddress {
    option (wire_type) = 5508;

    required string address = 1;                                 // Bech32m encoded CKB address
    required bytes lock_args = 2;                                // 32-byte Blake2b lock script args
    required bytes public_key = 3;                               // SPHINCS+ public key bytes
    required uint32 variant = 4;                                 // SPHINCS+ variant ID used
}

/**
 * Request: Sign a CKB transaction using SPHINCS+ post-quantum signature.
 *
 * Uses the same streaming protocol as CKBSignTx (reuses CKBTxRequest,
 * CKBTxAckInput, CKBTxAckOutput, CKBTxAckCellDep) but derives the signing
 * key via HKDF-SHA256 + SPHINCS+ instead of BIP-32 + secp256k1.
 *
 * @start
 * @next CKBTxRequest
 * @next Failure
 */
message CKBSphincsPlusSignTx {
    option (wire_type) = 5509;

    optional uint32 account_index = 1 [default=0];               // account index fed into the HKDF info string
    optional uint32 variant = 2 [default=49];                    // SPHINCS+ variant ID (48..=59)
    required string network = 3;                                 // "Mainnet" or "Testnet"
    required uint32 inputs_count = 4;                            // number of inputs
    required uint32 outputs_count = 5;                           // number of outputs
    optional uint32 cell_deps_count = 6 [default=0];             // number of cell dependencies
    optional uint64 fee = 7;                                     // transaction fee in shannons
    optional bool chunkify = 8;                                  // display addresses in chunks
}

// ============================================================
// Transaction Signing Messages (shared by ECDSA and SPHINCS+)
// ============================================================

/**
 * CKB Cell Input - reference to a cell to spend
 */
message CKBCellInput {
    required bytes previous_output_tx_hash = 1;                  // 32-byte transaction hash
    required uint32 previous_output_index = 2;                   // output index in that transaction
    optional uint64 since = 3 [default=0];                       // since field for time-lock

    // Optional input cell metadata used by SPHINCS+ ckb_tx_message_all hash.
    // All four fields must be provided together when cell_capacity is set.
    // Cell data and type script are intentionally not carried here — the
    // current SPHINCS+ flow only supports plain CKB transfers (empty data,
    // no type script on inputs). Extend this message when / if the handler
    // starts supporting sUDT, DAO, or other advanced cell patterns.
    optional uint64 cell_capacity = 4;
    optional bytes cell_lock_code_hash = 5;
    optional uint32 cell_lock_hash_type = 6;
    optional bytes cell_lock_args = 7;
}

/**
 * CKB Cell Output - new cell to create
 */
message CKBCellOutput {
    required uint64 capacity = 1;                                // capacity in shannons (1 CKB = 10^8 shannons)
    required bytes lock_code_hash = 2;                           // 32-byte lock script code hash
    required uint32 lock_hash_type = 3;                          // 0=data, 1=type, 2=data1, 4=data2
    required bytes lock_args = 4;                                // lock script args (usually 20-byte blake160)
    optional bytes type_code_hash = 5;                           // 32-byte type script code hash (optional)
    optional uint32 type_hash_type = 6;                          // type script hash type
    optional bytes type_args = 7;                                // type script args
    optional bytes data = 8;                                     // output data
}

/**
 * CKB Cell Dependency - reference to deployed code/data
 */
message CKBCellDep {
    required bytes tx_hash = 1;                                  // 32-byte transaction hash
    required uint32 index = 2;                                   // output index
    required uint32 dep_type = 3;                                // 0=code, 1=dep_group
}

/**
 * Request: Sign CKB transaction
 * @start
 * @next CKBTxRequest
 * @next Failure
 */
message CKBSignTx {
    option (wire_type) = 5502;

    repeated uint32 address_n = 1;                               // BIP-32 path for signing key
    optional string network = 2 [default='Mainnet'];             // Mainnet or Testnet
    required uint32 inputs_count = 3;                            // number of cell inputs
    required uint32 outputs_count = 4;                           // number of cell outputs
    optional uint32 cell_deps_count = 5 [default=0];             // number of cell dependencies
    optional uint64 fee = 6;                                     // transaction fee in shannons
    optional bool chunkify = 7;                                  // display addresses in chunks
}

/**
 * Request: Device asks for transaction data
 * @next CKBTxAckInput
 * @next CKBTxAckOutput
 * @next CKBTxAckCellDep
 */
message CKBTxRequest {
    option (wire_type) = 5503;

    optional CKBTxRequestType request_type = 1;
    optional CKBTxRequestDetails details = 2;
    optional CKBTxRequestSerialized serialized = 3;
}

/**
 * Type of transaction data requested
 */
enum CKBTxRequestType {
    TXINPUT = 0;
    TXOUTPUT = 1;
    TXCELLDEP = 2;
    TXFINISHED = 3;
    // SPHINCS+ signatures (up to ~50 KB) exceed the THP per-message buffer.
    // After signing, the device streams the signature back as a sequence of
    // CKBTxRequest{TXSIGCHUNK, details: {signature_offset, signature_total_size},
    // serialized: {signature: <chunk>}} messages. Each chunk is acknowledged by
    // the host via CKBTxAckSigChunk. The terminating TXFINISHED then carries
    // only `tx_hash` (signature is omitted because it has already been
    // delivered through the chunk stream).
    TXSIGCHUNK = 4;
}

/**
 * Details about the requested item
 */
message CKBTxRequestDetails {
    optional uint32 request_index = 1;
    // Used by TXSIGCHUNK only. `signature_offset` is the byte position of the
    // chunk inside the full signature; `signature_total_size` is the total
    // signature length and is set on every chunk so the host can validate.
    optional uint32 signature_offset = 2;
    optional uint32 signature_total_size = 3;
}

/**
 * Serialized signature data
 */
message CKBTxRequestSerialized {
    optional bytes signature = 1;                                // 65-byte recoverable secp256k1 signature
    optional bytes tx_hash = 2;                                  // 32-byte transaction hash
}

/**
 * Acknowledge: Provide cell input data
 * @next CKBTxRequest
 */
message CKBTxAckInput {
    option (wire_type) = 5504;

    optional CKBCellInput input = 1;
}

/**
 * Acknowledge: Provide cell output data
 * @next CKBTxRequest
 */
message CKBTxAckOutput {
    option (wire_type) = 5505;

    optional CKBCellOutput output = 1;
}

/**
 * Acknowledge: Provide cell dependency data
 * @next CKBTxRequest
 */
message CKBTxAckCellDep {
    option (wire_type) = 5506;

    optional CKBCellDep cell_dep = 1;
}

/**
 * Acknowledge a SPHINCS+ signature chunk. Empty body — host has nothing to
 * return, the message exists only to satisfy the request/response pattern of
 * the CKB streaming protocol.
 */
message CKBTxAckSigChunk {
    option (wire_type) = 5510;
}
